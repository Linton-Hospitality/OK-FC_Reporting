name: Ferncrest Weekly Pipeline

on:
  schedule:
    # 10am Pacific Daylight Time (PDT) = 17:00 UTC
    # Note: in winter (PST, UTC-8) this runs at 9am — adjust to 18:00 if preferred
    - cron: '0 17 * * 1'
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl python-dotenv anthropic requests

      - name: Run Ferncrest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python ferncrest_pipeline.py
