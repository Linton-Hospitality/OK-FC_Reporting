name: Ferncrest Weekly Pipeline

on:
  schedule:
    # Two triggers to cover both DST offsets for 10am Pacific.
    # Run at :05 past the hour, not on the hour — GitHub Actions queues
    # are heaviest exactly on the hour, which caused a missed/delayed run.
    - cron: '5 17 * * 1'   # 10:05am PDT (Mar–Nov)
    - cron: '5 18 * * 1'   # 10:05am PST (Nov–Mar)
  workflow_dispatch:   # allows manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip if this isn't the active DST trigger
        if: github.event_name == 'schedule'
        run: |
          LOCAL_HOUR=$(TZ='America/Los_Angeles' date +%H)
          if [ "$LOCAL_HOUR" != "10" ]; then
            echo "Current Pacific hour is $LOCAL_HOUR, not 10 — this is the other DST cron, skipping."
            echo "SKIP_RUN=true" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        if: env.SKIP_RUN != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: env.SKIP_RUN != 'true'
        run: pip install openpyxl python-dotenv anthropic requests

      - name: Run Ferncrest pipeline
        if: env.SKIP_RUN != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python ferncrest_pipeline.py

      - name: Publish report to GitHub Pages
        if: env.SKIP_RUN != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ferncrest_internal_dashboard.html pace_snapshot_cache.json
          git diff --cached --quiet || git commit -m "Update dashboard report [skip ci]"
          git push
